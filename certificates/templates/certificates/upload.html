{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Upload Certificate
    </h2>

    <!-- Form -->
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
      {% csrf_token %}

      <!-- Title Input -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Certificate Title
        </label>
        <input type="text" name="title" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
               placeholder="e.g. Internship Certificate">
      </div>

      <!-- File Upload -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Upload File
        </label>

        <div class="border-2 border-dashed border-gray-300 rounded-lg p-5 text-center hover:border-indigo-500 transition">
          <input type="file" name="file" required class="hidden" id="fileInput">

          <label for="fileInput" class="cursor-pointer text-gray-500">
            📄 Click to upload or drag & drop
            <br>
            <span class="text-xs text-gray-400">PDF, JPG, PNG</span>
          </label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex justify-between items-center">

        <a href="{% url 'certificate_hub' %}" 
           class="text-gray-500 hover:text-gray-700">
          ← Back
        </a>

        <button type="submit"
                class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition">
          Upload
        </button>

      </div>
    </form>

  </div>

</div>

{% endblock %}
