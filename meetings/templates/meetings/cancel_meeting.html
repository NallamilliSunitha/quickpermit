{% extends "base.html" %}
{% block content %}

<div class="max-w-2xl mx-auto mt-10 bg-white rounded-xl shadow p-6">
  <h2 class="text-2xl font-bold text-red-600 mb-3">Cancel Meeting</h2>
  <p class="text-gray-600 mb-4">
    Meeting: <b>{{ meeting.title }}</b>
  </p>

  {% if error %}
    <div class="mb-4 p-3 rounded bg-red-50 text-red-700 border border-red-200">
      {{ error }}
    </div>
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">
        Reason for cancellation
      </label>
      <textarea name="comment" rows="5"
                class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-red-500"
                placeholder="Explain why this meeting is being cancelled..." required></textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="bg-red-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-red-700">
        Cancel Meeting
      </button>

      <a href="{% url 'meeting_detail' meeting.id %}"
         class="bg-gray-300 text-gray-800 px-5 py-2 rounded-lg font-semibold hover:bg-gray-400">
        Back
      </a>
    </div>
  </form>
</div>

{% endblock %}
